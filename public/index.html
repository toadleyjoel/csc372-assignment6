<!DOCTYPE html>
<!--
  Name: Joel Pickett
  Date: 04.02.2026
  CSC 372-01

  This is the index.html page for the Node jokebook. It includes
  the random joke display, category list, search form, and add joke form. 
  It also links to the style.css and script.js files.
-->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jokebook</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">
    <div class="container my-5">
        <h1 class="text-center mb-4">The Great Node Jokebook</h1>
        
        <div class="card mb-4 shadow-sm border-primary">
            <div class="card-body text-center">
                <h5 class="card-title text-primary">Random Joke of the Day</h5>
                <p id="random-setup" class="fs-4 fw-bold mb-1"></p>
                <p id="random-delivery" class="fs-5 text-muted fst-italic"></p>
            </div>
        </div>

        <div class="row">
            <div class="col-md-4">
                <div class="card mb-3 shadow-sm">
                    <div class="card-body">
                        <h5>Categories</h5>
                        <ul id="category-list" class="list-group mb-3"></ul>
                        
                        <form id="search-form" class="d-flex">
                            <input type="text" id="search-input" class="form-control me-2" placeholder="Search category...">
                            <button type="submit" class="btn btn-outline-primary">Search</button>
                        </form>
                    </div>
                </div>
                
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h5>Add a Joke</h5>
                        <form id="add-joke-form">
                            <div class="mb-2">
                                <input type="text" id="add-category" class="form-control" placeholder="Category" required>
                            </div>
                            <div class="mb-2">
                                <input type="text" id="add-setup" class="form-control" placeholder="Setup" required>
                            </div>
                            <div class="mb-2">
                                <input type="text" id="add-delivery" class="form-control" placeholder="Delivery" required>
                            </div>
                            <button type="submit" class="btn btn-success w-100">Add Joke</button>
                        </form>
                    </div>
                </div>
            </div>

            <div class="col-md-8">
                <div class="card shadow-sm">
                    <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
                        <h4 id="display-category-title" class="mb-0">Select a Category</h4>
                    </div>
                    <div class="card-body">
                        <div id="jokes-container" class="row g-3">
                            <p class="text-muted text-center">Jokes will appear here.</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
